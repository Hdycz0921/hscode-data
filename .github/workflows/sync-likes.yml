name: Sync likes.json

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Fetch likes data from Issues
        run: |
          echo "{}" > likes.json
          LIKES_REPO="Hdycz0921/hscode-likes"
          PAGE=1
          while true; do
            RESP=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
              "https://api.github.com/repos/${LIKES_REPO}/issues?state=all&labels=like-data&per_page=100&page=${PAGE}")
            COUNT=$(echo "$RESP" | jq length)
            if [ "$COUNT" -eq 0 ]; then break; fi

            echo "$RESP" | jq -c '.[]' | while read -r issue; do
              TITLE=$(echo "$issue" | jq -r '.title')
              STATE=$(echo "$issue" | jq -r '.state')
              BODY=$(echo "$issue" | jq -r '.body')
              
              # Only process [LIKE] titled issues (created by cloud function)
              if echo "$TITLE" | grep -q '^\[LIKE\]'; then
                # Extract keyword and code from title: [LIKE] keyword::code
                KEY=$(echo "$TITLE" | sed 's/^\[LIKE\] //' | sed 's/::/___/')
                # Parse body JSON
                if echo "$BODY" | jq -e '.' > /dev/null 2>&1; then
                  BODY_DATA=$(echo "$BODY")
                  VALID=$(echo "$BODY_DATA" | jq -r '.like + .unlike + (.total | length // 0)' 2>/dev/null || echo "0")
                  if [ "$VALID" != "0" ]; then
                    WEIGHT=$(echo "$BODY_DATA" | jq '(.like // 0) - (.unlike // 0)' 2>/dev/null || echo "0")
                    if [ "$STATE" = "closed" ]; then
                      # Closed = cancelled, weight 0
                      WEIGHT=0
                    fi
                    # Write entry as keyword::hs_code -> {like, unlike, weight}
                    jq --arg k "$KEY" --argjson l "$(echo "$BODY_DATA" | jq '.like // 0')" \
                       --argjson u "$(echo "$BODY_DATA" | jq '.unlike // 0')" \
                       --argjson w "$WEIGHT" \
                       '.[$k] = {like: $l, unlike: $u, weight: $w}' likes.json > likes_new.json
                    mv likes_new.json likes.json
                  fi
                fi
              fi
            done

            PAGE=$((PAGE + 1))
          done

          ENTRY_COUNT=$(jq length likes.json)
          echo "✅ Generated likes.json with ${ENTRY_COUNT} entries"

      - name: Commit and push
        run: |
          git config user.name "hscode-data-bot"
          git config user.email "hscode-data-bot@users.noreply.github.com"
          git add likes.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync likes.json from issues [skip ci]"
            git push
          fi
